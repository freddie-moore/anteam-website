name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@main

      - name: Inject cache-busting version
        run: |
          SHORT_SHA="${GITHUB_SHA:0:8}"
          sed -i "s/href=\"style\.css\"/href=\"style.css?v=$SHORT_SHA\"/g" index.html
          sed -i "s/src=\"main\.js\"/src=\"main.js?v=$SHORT_SHA\"/g" index.html

      - name: Deploy via rsync over SSH
        uses: easingthemes/ssh-deploy@main
        with:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          REMOTE_HOST: ${{ secrets.SERVER_IP }}
          REMOTE_USER: ubuntu
          SOURCE: "./"
          TARGET: "/var/www/anteam-ai"
          EXCLUDE: ".git/, .github/, node_modules/, .env"
